<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #060606;
    -webkit-font-smoothing: antialiased;
  }

  .banner {
    width: 1200px;
    height: 675px;
    position: relative;
    overflow: hidden;
    background: #060606;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Noise grain ── */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.7;
  }

  /* ── Radial atmosphere ── */
  .glow-center {
    position: absolute;
    width: 900px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(89,193,132,0.07) 0%, transparent 68%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }

  .glow-outer {
    position: absolute;
    width: 1400px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(89,193,132,0.03) 0%, transparent 60%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Scan lines ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* ── Icon watermark ── */
  .watermark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.045;
    pointer-events: none;
    z-index: 2;
  }

  /* ── Top & bottom border accents ── */
  .edge-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent 5%, rgba(89,193,132,0.25) 30%, rgba(89,193,132,0.35) 50%, rgba(89,193,132,0.25) 70%, transparent 95%);
    z-index: 10;
  }
  .edge-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent 5%, rgba(255,255,255,0.06) 50%, transparent 95%);
    z-index: 10;
  }

  /* ── Corner marker ── */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 20px; height: 20px;
    z-index: 10;
  }
  .corner-tl { top: 22px; left: 28px; border-top: 1px solid rgba(89,193,132,0.3); border-left: 1px solid rgba(89,193,132,0.3); }
  .corner-tr { top: 22px; right: 28px; border-top: 1px solid rgba(89,193,132,0.3); border-right: 1px solid rgba(89,193,132,0.3); }
  .corner-bl { bottom: 22px; left: 28px; border-bottom: 1px solid rgba(89,193,132,0.15); border-left: 1px solid rgba(89,193,132,0.15); }
  .corner-br { bottom: 22px; right: 28px; border-bottom: 1px solid rgba(89,193,132,0.15); border-right: 1px solid rgba(89,193,132,0.15); }

  /* ── Main content ── */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  /* Redacted blocks row */
  .redacted-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .block {
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    height: 13px;
  }
  .block.w60  { width: 60px; }
  .block.w90  { width: 90px; }
  .block.w48  { width: 48px; }
  .block.w72  { width: 72px; }
  .block.w36  { width: 36px; }
  .block.w110 { width: 110px; }

  .redacted-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(89,193,132,0.25);
    flex-shrink: 0;
  }

  /* Main headline */
  .headline {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-bottom: 40px;
  }

  .line-light {
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -3px;
    line-height: 1.0;
    color: rgba(255,255,255,0.55);
  }

  .line-bold {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1.0;
    color: #ffffff;
  }

  .line-accent {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1.0;
    color: #59C184;
  }

  /* Signal line */
  .signal {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
  }

  .signal-dash {
    width: 28px; height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .signal em {
    font-style: normal;
    color: rgba(89,193,132,0.5);
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
  }

  .footer-icon {
    opacity: 0.28;
  }

  .footer-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.3px;
  }

  .footer-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(89,193,132,0.22);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="banner" id="teaser-banner">

  <!-- atmosphere -->
  <div class="glow-center"></div>
  <div class="glow-outer"></div>
  <div class="scanlines"></div>

  <!-- icon watermark -->
  <div class="watermark">
    <svg width="560" height="560" viewBox="0 0 380 521" fill="none">
      <path d="M68.5237 278.127C43.9914 235.635 58.55 181.302 101.041 156.77L241.228 399.581C265.761 442.072 251.202 496.406 208.711 520.938L68.5237 278.127Z" fill="#59C184"/>
      <path d="M124.334 143.322C167.215 118.565 222.047 133.257 246.805 176.138L323.419 308.837C280.537 333.595 225.706 318.903 200.948 276.021L124.334 143.322Z" fill="white"/>
      <path d="M243.64 121.357C219.108 78.8659 233.667 24.5325 276.158 0L377.223 175.05C401.755 217.541 387.197 271.875 344.706 296.407L243.64 121.357Z" fill="#59C184"/>
    </svg>
  </div>

  <!-- frame corners -->
  <div class="edge-top"></div>
  <div class="edge-bottom"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <!-- main content -->
  <div class="content">
    <div class="redacted-row">
      <div class="block w90"></div>
      <div class="redacted-dot"></div>
      <div class="block w60"></div>
      <div class="redacted-dot"></div>
      <div class="block w110"></div>
      <div class="redacted-dot"></div>
      <div class="block w48"></div>
      <div class="redacted-dot"></div>
      <div class="block w72"></div>
    </div>

    <div class="headline">
      <span class="line-light">the infrastructure</span>
      <span class="line-bold">we wished</span>
      <span class="line-accent">existed.</span>
    </div>

    <div class="signal">
      <span class="signal-dash"></span>
      open source <em>//</em> coming soon
      <span class="signal-dash"></span>
    </div>
  </div>

  <!-- footer -->
  <div class="footer">
    <svg class="footer-icon" height="22" viewBox="0 0 380 521" fill="none">
      <path d="M68.5237 278.127C43.9914 235.635 58.55 181.302 101.041 156.77L241.228 399.581C265.761 442.072 251.202 496.406 208.711 520.938L68.5237 278.127Z" fill="#59C184"/>
      <path d="M124.334 143.322C167.215 118.565 222.047 133.257 246.805 176.138L323.419 308.837C280.537 333.595 225.706 318.903 200.948 276.021L124.334 143.322Z" fill="white"/>
      <path d="M243.64 121.357C219.108 78.8659 233.667 24.5325 276.158 0L377.223 175.05C401.755 217.541 387.197 271.875 344.706 296.407L243.64 121.357Z" fill="#59C184"/>
    </svg>
    <span class="footer-url">hyperpush.dev</span>
    <span class="footer-tag">#buildinpublic</span>
  </div>

</div>
</body>
</html>
